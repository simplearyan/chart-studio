<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Chart Studio Editorial - Premium Vox & Flourish style data visualizations." />
    
    <title>Editorial Studio | Chart Studio</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700;900&family=Roboto+Serif:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/main.css">
    <link rel="stylesheet" id="export-styles" href="./src/styles/export.css">
    <style>
        :root {
            --vox-yellow: #FFCC00;
            --vox-bg: #000000;
            --flourish-bg: #ffffff;
            --editorial-accent: #2dd4bf;
        }

        .editorial-studio-layout {
            background-color: var(--bg-primary);
        }

        .editorial-branding {
            color: var(--vox-yellow);
            font-family: 'Merriweather', serif;
            font-weight: 900;
            font-style: italic;
        }

        .property-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .editorial-preview {
            background-color: #1a1a1a;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-premium);
        }
    </style>
  </head>
  <body>
    <div id="app" class="studio-layout editorial-studio-layout">
        <header class="studio-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                <span>Chart Studio <span class="editorial-branding">Editorial</span></span>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to MVP
                </a>
                <button id="btn-export-png" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span>Image</span>
                </button>
                <button id="btn-export-video" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span class="btn-text">Export Video</span>
                </button>
            </div>
        </header>

        <main class="studio-content">
            <div class="canvas-area">
                <section class="canvas-panel">
                    <div id="canvas-container" class="canvas-container">
                        <canvas id="main-canvas" width="1280" height="720" class="shadow-premium"></canvas>
                    </div>
                </section>

                <footer class="playback-controls">
                    <button id="btn-play" class="control-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <div class="timeline-scrubber">
                        <input type="range" id="timeline-slider" min="0" max="100" value="0">
                        <div class="time-display"><span id="time-current">0.0</span>s / <span id="time-total">5.0</span>s</div>
                    </div>
                </footer>
            </div>

            <aside class="sidebar unified-sidebar">
                <details class="accordion" open name="sidebar-group">
                    <summary><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg> Editorial Preset</summary>
                    <div class="accordion-content">
                        <div class="control-group">
                            <label>Design System</label>
                            <div class="chart-type-selector">
                                <button class="type-btn active" data-theme="vox">
                                    <span class="editorial-branding" style="font-style: normal; font-size: 1.2rem;">Vox</span> Style
                                </button>
                                <button class="type-btn" data-theme="flourish">
                                    <span style="font-family: inherit; font-weight: 800; color: #3b82f6;">Flourish</span> Style
                                </button>
                            </div>
                        </div>

                        <div class="control-group">
                            <label>Design Customization</label>
                            <div class="property-grid">
                                <input type="color" id="conf-bg-color" value="#0a0a0a" title="Background Color">
                                <input type="color" id="conf-text-color" value="#ffffff" title="Text Color">
                            </div>
                            <div class="control-group mt-2">
                                <label><input type="checkbox" id="conf-smoothing" checked> Line Smoothing</label>
                            </div>
                            <div class="control-group mt-2">
                                <label>Line Thickness</label>
                                <input type="range" id="conf-line-width" min="1" max="12" value="4" class="input-field">
                            </div>
                        </div>

                        <div class="control-group">
                            <label>Chart Mode</label>
                            <div class="property-grid">
                                <button class="type-btn active" data-type="bar">Bar</button>
                                <button class="type-btn" data-type="line">Line</button>
                                <button class="type-btn" data-type="race">Race</button>
                                <button class="type-btn" data-type="line-race">Line Race</button>
                                <button class="type-btn" data-type="area">Area</button>
                            </div>
                        </div>
                    </div>
                </details>

                <details class="accordion" name="sidebar-group">
                    <summary><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg> Story Metadata</summary>
                    <div class="accordion-content">
                        <div class="control-group">
                            <label for="meta-headline">Headline</label>
                            <input type="text" id="meta-headline" class="input-field" placeholder="The rise of digital assets">
                        </div>
                        <div class="control-group">
                            <label for="meta-subheadline">Subheadline</label>
                            <textarea id="meta-subheadline" class="input-field" style="height: 60px;" placeholder="Tracking the growth of BTC and ETH since 2020"></textarea>
                        </div>
                        <div class="control-group">
                            <label for="meta-source">Source Data</label>
                            <input type="text" id="meta-source" class="input-field" placeholder="Source: Bloomberg, CoinDesk">
                        </div>
                    </div>
                </details>

                <details class="accordion" name="sidebar-group">
                    <summary><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Data Input</summary>
                    <div class="accordion-content">
                        <div class="control-group">
                            <textarea id="data-input" class="code-editor">[
  {"label": "BTC", "values": [10, 25, 45, 30, 60, 85, 90]},
  {"label": "ETH", "values": [5, 15, 30, 25, 45, 55, 65]},
  {"label": "ADA", "values": [2, 10, 15, 12, 20, 30, 42]}
]</textarea>
                            <button id="btn-update-data" class="btn btn-secondary w-full mt-2">Update Visuals</button>
                        </div>
                    </div>
                </details>

                <details class="accordion" name="sidebar-group">
                    <summary><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"/><path d="M12 8v4l3 3"/></svg> Animation Settings</summary>
                    <div class="accordion-content">
                        <div class="property-grid">
                            <div class="control-group">
                                <label for="conf-duration">Duration (s)</label>
                                <input type="number" id="conf-duration" value="5" min="1" max="60" class="input-field">
                            </div>
                            <div class="control-group">
                                <label for="conf-fps">Export FPS</label>
                                <select id="conf-fps" class="select-field">
                                    <option value="30">30 FPS</option>
                                    <option value="60" selected>60 FPS</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </details>
            </aside>
        </main>
    </div>

    <!-- Export Overlay -->
    <div id="export-overlay" class="export-overlay hidden">
        <div class="export-modal glass-panel">
            <h2>Rendering Masterpiece...</h2>
            <div class="progress-bar-container">
                <div id="export-progress-bar" class="progress-bar"></div>
            </div>
            <p id="export-status">Encoding Editorial Frames...</p>
        </div>
    </div>

    <script type="module" src="./src/scripts/editorial.js"></script>
  </body>
</html>
