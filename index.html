<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Chart Studio Web - A high-performance, vanilla JavaScript timeline editor for producing, rendering, and actively recording beautiful statistical data animations in 60FPS." />
    <meta name="keywords" content="Chart Studio, WebCodecs, Animation Editor, Video Exporter, MediaBunny, Data Visualization, Bar Chart Race" />
    <meta name="author" content="Aryan - Kenichi Team" />
    
    <!-- Open Graph for SEO & Social Media -->
    <meta property="og:title" content="Chart Studio Web - Advanced Video Exporter" />
    <meta property="og:description" content="A powerful timeline editor with Canvas 2D engine powering dual MediaRecorder & WebCodec render pipelines." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chart-studio.demo" />

    <title>Chart Studio MVP Exporter</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./export-styles.css">
  </head>
  <body>
    <div id="app" class="studio-layout">
        <header class="studio-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                <span>Chart Studio</span>
            </div>
            <div class="header-actions">
                <button id="btn-export-png" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span class="btn-text">Image</span>
                </button>
                <button id="btn-export-video" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span class="btn-text">Export Video</span>
                </button>
            </div>
        </header>

        <main class="studio-content">
            <!-- Left/Top Side: Visualization & Controls -->
            <div class="canvas-area">
                <section class="canvas-panel">
                    <div id="canvas-container" class="canvas-container shadow-premium">
                        <canvas id="main-canvas" width="1280" height="720"></canvas>
                    </div>
                </section>

                <footer class="playback-controls">
                    <button id="btn-play" class="control-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <div class="timeline-scrubber">
                        <input type="range" id="timeline-slider" min="0" max="100" value="0">
                        <div class="time-display"><span id="time-current">0.0</span>s / <span id="time-total">5.0</span>s</div>
                    </div>
                </footer>
            </div>

            <!-- Right Sidebar: Properties & Exports -->
            <aside class="sidebar unified-sidebar">
                
                <details class="accordion" open>
                    <summary><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Data Structure</summary>
                    <div class="accordion-content">
                        <div class="control-group">
                            <label>Chart Mode</label>
                            <div class="chart-type-selector">
                                <button class="type-btn active" data-type="bar">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg> Bar
                                </button>
                                <button class="type-btn" data-type="line">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg> Line
                                </button>
                                <button class="type-btn" data-type="race">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2Z"/><path d="M12 6v12"/><path d="M8 10v8"/><path d="M16 14v4"/></svg> Race
                                </button>
                            </div>
                        </div>

                        <div class="control-group">
                            <label>JSON Source</label>
                            <textarea id="data-input" class="code-editor">[
    {"label": "Apple 🍎", "val": 10},
    {"label": "Banana 🍌", "val": 20},
    {"label": "Cat 😼", "val": 45},
    {"label": "Dog 🐶", "val": 30}
]</textarea>
                            <button id="btn-update-data" class="btn btn-secondary w-full mt-2">Compile JSON</button>
                        </div>
                    </div>
                </details>

                <details class="accordion" open>
                    <summary><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/></svg> Project Settings</summary>
                    <div class="accordion-content">
                        <div class="control-group">
                            <label>Theme Palette</label>
                            <div class="color-palette">
                                <button class="palette-swatch active" style="background: linear-gradient(135deg, #a855f7, #6366f1)" data-palette="purple-indigo"></button>
                                <button class="palette-swatch" style="background: linear-gradient(135deg, #ec4899, #f43f5e)" data-palette="pink-rose"></button>
                                <button class="palette-swatch" style="background: linear-gradient(135deg, #10b981, #3b82f6)" data-palette="emerald-blue"></button>
                            </div>
                        </div>

                        <div class="control-group">
                            <label for="conf-duration">Duration Offset (s)</label>
                            <input type="number" id="conf-duration" value="5" min="1" max="60" class="input-field">
                        </div>

                        <div class="control-group">
                            <label for="conf-easing">Engine Easing</label>
                            <select id="conf-easing" class="select-field">
                                <option value="easeInOutCubic">Ease In Out</option>
                                <option value="easeOutElastic">Elastic Out</option>
                                <option value="easeOutBounce">Bounce</option>
                            </select>
                        </div>
                    </div>
                </details>

                <details class="accordion" open>
                    <summary><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Output Protocol</summary>
                    <div class="accordion-content">
                        <div class="control-group">
                            <label class="font-bold text-xs">CONTAINER FORMAT</label>
                            <div class="format-grid">
                                <button class="toggle-btn format-btn active" data-value="mp4">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
                                    <span>MP4</span>
                                </button>
                                <button class="toggle-btn format-btn" data-value="webm">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                                    <span>WEBM</span>
                                </button>
                                <button class="toggle-btn format-btn" data-value="mov">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.5 16V8A1.5 1.5 0 0 0 21 6.5h-3L15 9H9l-3-2.5H3A1.5 1.5 0 0 0 1.5 8v8A1.5 1.5 0 0 0 3 17.5h18a1.5 1.5 0 0 0 1.5-1.5Z"/></svg>
                                    <span>MOV</span>
                                </button>
                                <button class="toggle-btn format-btn" data-value="png_sequence">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                    <span>PNG SEQ</span>
                                </button>
                            </div>
                        </div>

                        <div class="control-group">
                            <label class="font-bold text-xs">WORKER PIPELINE</label>
                            <div class="process-grid">
                                <button class="toggle-btn process-btn process-render active" data-value="render">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                                    <div class="process-title">Render Layer</div>
                                </button>
                                <button class="toggle-btn process-btn process-record" data-value="record">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                                    <div class="process-title">Live Native</div>
                                </button>
                            </div>
                        </div>

                        <div class="control-group mt-2">
                            <label class="font-bold text-xs">CAPTURE RATE (FPS)</label>
                            <div class="fps-grid">
                                <button class="toggle-btn fps-btn" data-value="12">12</button>
                                <button class="toggle-btn fps-btn" data-value="24">24</button>
                                <button class="toggle-btn fps-btn" data-value="30">30</button>
                                <button class="toggle-btn fps-btn active" data-value="60">60</button>
                            </div>
                        </div>
                    </div>
                </details>
            </aside>
        </main>

    <!-- Export Overlay -->
    <div id="export-overlay" class="export-overlay hidden">
        <div class="export-modal glass-panel">
            <h2>Rendering Video...</h2>
            <div class="progress-bar-container">
                <div id="export-progress-bar" class="progress-bar"></div>
            </div>
            <p id="export-status">Preparing frames...</p>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
